version: '3.8'

services:
  tekparola:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tekparola-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - tekparola-network

  postgres:
    image: postgres:15-alpine
    container_name: tekparola-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER:-tekparola}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME:-tekparola}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tekparola}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tekparola-network

  redis:
    image: redis:7-alpine
    container_name: tekparola-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tekparola-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  tekparola-network:
    driver: bridge